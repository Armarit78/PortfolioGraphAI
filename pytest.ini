[pytest]
pythonpath = backend
testpaths = tests_backend
asyncio_mode = auto

filterwarnings =
    ignore:Type google\._upb\._message\.MessageMapContainer uses PyType_Spec.*:DeprecationWarning
    ignore:Type google\._upb\._message\.ScalarMapContainer uses PyType_Spec.*:DeprecationWarning
    ignore:`pydantic\.config\.Extra` is deprecated.*:DeprecationWarning
    ignore:.*PydanticDeprecatedSince20.*:DeprecationWarning